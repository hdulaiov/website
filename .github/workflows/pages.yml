name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install WeasyPrint deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-open-sans libpango-1.0-0 libcairo2 pango1.0-tools libgdk-pixbuf2.0-0 libffi-dev libglib2.0-0
          python -m pip install --upgrade pip
          python -m pip install "weasyprint>=67"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Render site with Quarto
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
